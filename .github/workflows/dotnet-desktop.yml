name: .NET Core Desktop Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 .NET SDK
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 2. 现场动态创建项目、安装缺少的依赖包并编译
    - name: Dynamically Create Project and Build
      run: |
        # 创建标准的控制台项目模板
        dotnet new console -n TempApp --force
        
        # 为新项目安装 System.Management 依赖包
        dotnet add TempApp package System.Management
        
        # 把你的 activate.cs 覆盖到新项目的 Program.cs 里面去
        Copy-Item -Path "activate.cs" -Destination "TempApp/Program.cs" -Force
        
        # 进入临时项目文件夹，执行标准的编译
        cd TempApp
        dotnet build --configuration Release

    # 3. 👈 精准修复：用通配符打包 TempApp 目录下所有编译生成的产物
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Desktop-App
        path: |
          TempApp/bin/Release/**/TempApp.exe
          TempApp/bin/Release/**/TempApp.dll
          TempApp/bin/Release/**/*.json
