name: .NET Core Desktop Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 1. 安装 .NET SDK
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 2. 绕过项目系统，直接调用 csc 编译器硬核编译单文件
    - name: Build Single CS File
      run: |
        $cscPath = Get-ChildItem -Path "C:\Program Files\dotnet\sdk" -Filter "csc.dll" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        dotnet "$cscPath" /out:MyProgram.exe *.cs

    # 3. 把编译出来的可执行文件（.exe）保存到 GitHub
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Desktop-App
        path: MyProgram.exe
