# 2. 现场动态创建项目、安装缺少的依赖包，并以【独立单文件】模式发布
    - name: Dynamically Create Project and Build
      run: |
        # 创建标准的控制台项目模板
        dotnet new console -n TempApp --force
        
        # 为新项目安装 System.Management 依赖包
        dotnet add TempApp package System.Management
        
        # 把你的 activate.cs 覆盖到新项目的 Program.cs 里面去
        Copy-Item -Path "activate.cs" -Destination "TempApp/Program.cs" -Force
        
        # 进入临时项目文件夹
        cd TempApp
        
        # 👈 核心升级：执行发布命令，合并为单文件，并指定输出名字为 my-activator.exe（可以改成你喜欢的名字）
        dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o ./publish_output/
        
        # 将生成的单文件重命名为你想要的名字
        Rename-Item -Path "./publish_output/TempApp.exe" -NewName "kms-activator.exe"

    # 3. 👈 完美捕获：这次只上传那一个纯净的 .exe 文件
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Desktop-App
        path: TempApp/publish_output/kms-activator.exe
